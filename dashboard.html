<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #ffffff;
    }

    header {
      background-color: #1f1f1f;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #03dac6;
    }

    header h1 {
      margin: 0;
      color: #03dac6;
    }

    nav {
      background-color: #1a1a1a;
      padding: 12px;
      text-align: center;
    }

    nav a {
      color: #ffffff;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      color: #03dac6;
    }

    main {
      max-width: 800px;
      margin: 40px auto;
      background-color: #1f1f1f;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    h2 {
      color: #03dac6;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
    }

    footer {
      text-align: center;
      padding: 15px;
      margin-top: 30px;
      color: #bbbbbb;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Painel Principal</h1>
  </header>

  <nav>
    <a href="index.html">Login</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="cadastro.html">Cadastro</a>
  </nav>

  <main>
    <h2>Bem-vindo, usuário autenticado!</h2>

  </main>

  <footer>
    <p>Projeto desenvolvido para a atividade de Git e GitHub</p>
  </footer>

</html>
